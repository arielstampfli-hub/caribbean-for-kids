media:
  input: assets
  output: /assets

content:
  - name: site
    label: Website Content
    type: file
    path: content.json
    fields:
      - name: heroLead
        label: Intro line (top of the page)
        type: text
      - name: bundlePrice
        label: Bundle price (e.g. US$29)
        type: string
      - name: amazonFlags
        label: "Amazon link — National Flags book"
        type: string
      - name: amazonDinos
        label: "Amazon link — Dinos in the Caribbean"
        type: string
      - name: amazonFruits
        label: "Amazon link — Fruits of the Caribbean"
        type: string
      - name: amazonBirds
        label: "Amazon link — National Birds book"
        type: string
      - name: instagramUrl
        label: Instagram profile URL
        type: string
      - name: whatsappNumber
        label: "WhatsApp / phone number — digits only (e.g. 18684665437)"
        type: string
      - name: phoneDisplay
        label: Phone number as shown on the site
        type: string
      - name: email
        label: Contact email
        type: string
      - name: address
        label: Address / location
        type: text